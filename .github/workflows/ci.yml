name: CI Setup
on:
  push:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test15b
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: instalar java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: compilar proyecto
        run: mvn clean package -DskipTests

      - name: verificar el jar generado
        run: ls -l target/*.jar

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: construir imagen docker
        run: docker build -t jaydeth/backend-spring:latest .

      - name: Publicar imagen en DockerHub
        run: docker push jaydeth/backend-spring:latest

  deploy-backend:
    needs: build-backend
    runs-on: self-hosted
    steps:
      - name: Actualizar contenedor backend
        run: |
          cd "/home/jaydethsp/Descargas/proyecto_docker_compose_limpio (1)/proyecto_docker_compose_limpio"
          docker compose pull backend
          docker compose up -d backend
